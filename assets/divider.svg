<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2" width="100%" height="2">
  <style>
    @keyframes pulse {
      0% { opacity: 0.45; }
      50% { opacity: 0.85; }
      100% { opacity: 0.45; }
    }
    .pulsing-glow {
      animation: pulse 3s ease-in-out infinite;
    }
  </style>
  <defs>
    <!-- Shimmer/Flow Gradient -->
    <linearGradient id="glow-grad" x1="-100%" y1="0%" x2="0%" y2="0%">
      <animate attributeName="x1" from="-100%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="4s" repeatCount="indefinite" />
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0" />
      <stop offset="30%" stop-color="#F59E0B" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#FDE047" stop-opacity="1" />
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0" />
    </linearGradient>
    
    <!-- Base Background Gradient (fades to transparent at ends) -->
    <linearGradient id="base-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0" />
      <stop offset="20%" stop-color="#F59E0B" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#FDE047" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#F59E0B" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Base quiet line -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#base-grad)" />
  
  <!-- Animated glowing sweep overlay -->
  <rect class="pulsing-glow" x="0" y="0" width="1000" height="2" fill="url(#glow-grad)" />
</svg>
