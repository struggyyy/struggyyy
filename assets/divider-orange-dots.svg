<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 14" width="100%" height="14">
  <defs>
    <linearGradient id="fade-grad" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A00" stop-opacity="0" />
      <stop offset="15%" stop-color="#FF7A00" stop-opacity="1" />
      <stop offset="85%" stop-color="#FF7A00" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0" />
    </linearGradient>
  </defs>

  <line x1="0" y1="7" x2="1000" y2="7" stroke="url(#fade-grad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="0.1 29.9">
    <animate attributeName="stroke-dashoffset" from="30" to="0" dur="1s" repeatCount="indefinite" />
  </line>
