<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 14" width="100%" height="14">
  <style>
    .dots {
      stroke: #FF7A00;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 0 30;
      animation: flow 1s linear infinite;
    }
    @keyframes flow {
      from { stroke-dashoffset: 30; }
      to { stroke-dashoffset: 0; }
    }
  </style>
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="15%" stop-color="white" stop-opacity="1" />
      <stop offset="85%" stop-color="white" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="fade-mask">
      <rect x="0" y="0" width="1000" height="14" fill="url(#fade)" />
    </mask>
  </defs>
  <line x1="0" y1="7" x2="1000" y2="7" class="dots" mask="url(#fade-mask)" />
</svg>
